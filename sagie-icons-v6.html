<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;font-family:'DM Sans',sans-serif;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
.page{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px;padding:60px 40px;border-bottom:0.5px solid rgba(255,255,255,0.07);}
.icon-wrap{display:flex;align-items:center;justify-content:center;cursor:pointer;transition:filter 0.35s ease;}
/* Hover glow — applied via JS adding .glow class */
.icon-wrap.glow{filter:drop-shadow(0 0 18px rgba(255,255,255,0.55)) drop-shadow(0 0 40px rgba(255,255,255,0.2));}
.tag{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.3);text-align:center;}
.title{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:.12em;color:#fff;text-align:center;margin-top:-12px;}
.replay{background:transparent;border:0.5px solid rgba(255,255,255,.2);color:rgba(255,255,255,.5);font-family:'DM Sans',sans-serif;font-size:10px;letter-spacing:.14em;text-transform:uppercase;padding:8px 22px;border-radius:2px;cursor:pointer;transition:all .15s;}
.replay:hover{border-color:rgba(255,255,255,.6);color:#fff;}
</style>
</head>

  <div class="tag">Resources</div>
  <div class="title">Resources</div>
  <button class="replay" onclick="playResources()">&#8635; Replay</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>

function settle(el){
  gsap.to(el,{scale:1.04,duration:0.35,ease:'power1.inOut',transformOrigin:'50% 50%'});
  gsap.to(el,{scale:1,duration:0.7,delay:0.35,ease:'elastic.out(1,0.55)',transformOrigin:'50% 50%'});
}

/* ── Hover glow (all icons) ── */
document.querySelectorAll('.icon-wrap').forEach(wrap=>{
  wrap.addEventListener('mouseenter',()=>wrap.classList.add('glow'));
  wrap.addEventListener('mouseleave',()=>wrap.classList.remove('glow'));
});

/* ══════════════════════════════════
   COMMUNITY
   Entrance: nodes 0-4 reveal, then connectors 5-10
   Idle: NONE
   Hover: glow only (via CSS class above)
   ══════════════════════════════════ */
function playCommunity(){
  const nodes = Array.from({length:5},(_,i)=>'#cm'+i);
  const conns = Array.from({length:6},(_,i)=>'#cm'+(i+5));
  gsap.set([...nodes,...conns],{opacity:0});
  const tl = gsap.timeline();
  tl.to(nodes,{opacity:1,duration:0.45,stagger:0.13,ease:'power2.out'});
  tl.to(conns,{opacity:1,duration:0.3,stagger:0.08,ease:'power1.out'},'-=0.1');
  tl.add(()=>settle('#cm-wrap'));
}

/* ══════════════════════════════════
   VENTURES
   vn0 = main ring+lines body (the paths)
   vn1 = center filled circle
   vn2 = node top-right
   vn3 = node right
   vn4 = node bottom-right
   vn5 = node left

   Entrance: vn5 → vn0 → vn1 → pause → vn2 → vn3 → vn4
   Idle: vn0 paths brightness dims/brightens (not whole icon, not opacity)
         vn1 also pulses slightly offset
   Hover: glow only
   ══════════════════════════════════ */
let vnIdle=[];
function stopVnIdle(){vnIdle.forEach(t=>t.kill());vnIdle=[];}

function playVentures(){
  stopVnIdle();
  const all=['#vn0','#vn1','#vn2','#vn3','#vn4','#vn5'];
  gsap.set(all,{opacity:0});
  /* reset any brightness from previous idle */
  gsap.set(['#vn0','#vn1'],{filter:'brightness(1)'});
  const tl=gsap.timeline({onComplete:startVnIdle});
  tl.to('#vn5',{opacity:1,duration:0.4,ease:'back.out(2)'});
  tl.to('#vn0',{opacity:1,duration:0.7,ease:'power2.out'},'+=0.1');
  tl.to('#vn1',{opacity:1,duration:0.55,ease:'power2.out'},'+=0.1');
  tl.to({},{duration:0.45});
  tl.to('#vn2',{opacity:1,duration:0.4,ease:'back.out(1.8)'},'+=0.05');
  tl.to('#vn3',{opacity:1,duration:0.4,ease:'back.out(1.8)'},'+=0.12');
  tl.to('#vn4',{opacity:1,duration:0.4,ease:'back.out(1.8)'},'+=0.12');
  tl.add(()=>settle('#vn-wrap'));
}

function startVnIdle(){
  /* paths (vn0) brightness dims — opacity stays 1 */
  vnIdle.push(gsap.to('#vn0',{
    filter:'brightness(0.4)',
    duration:2.2, yoyo:true, repeat:-1, ease:'sine.inOut'
  }));
  /* center circle offset */
  vnIdle.push(gsap.to('#vn1',{
    filter:'brightness(0.5)',
    duration:2.6, yoyo:true, repeat:-1, ease:'sine.inOut', delay:0.6
  }));
}

document.getElementById('vn-wrap').addEventListener('mouseleave',()=>{
  /* restore brightness on leave */
  gsap.to(['#vn0','#vn1'],{filter:'brightness(1)',duration:0.3});
  setTimeout(startVnIdle, 350);
});
document.getElementById('vn-wrap').addEventListener('mouseenter',()=>{
  stopVnIdle();
  gsap.to(['#vn0','#vn1'],{filter:'brightness(1)',duration:0.2});
});

/* ══════════════════════════════════
   SOLUTIONS
   Entrance: paths stagger in (0.65s each, 0.08s stagger) — unchanged, working
   Idle: ONLY the line/connecting paths pulse via brightness
         sl0 = big circle (skip — keep full brightness)
         sl1 onwards = connecting lines and small circles — these pulse
         Keep brightness min at 0.6 so never invisible
   Hover: glow only
   ══════════════════════════════════ */
let slIdle=[];
function stopSlIdle(){slIdle.forEach(t=>t.kill());slIdle=[];}

function playSolutions(){
  stopSlIdle();
  const paths=Array.from(document.querySelectorAll('[id^="sl"]'));
  gsap.set(paths,{opacity:0,filter:'brightness(1)'});
  gsap.to(paths,{
    opacity:1, duration:0.65, stagger:0.08, ease:'power2.out',
    onComplete:startSlIdle
  });
}

function startSlIdle(){
  const paths=Array.from(document.querySelectorAll('[id^="sl"]'));
  /* skip sl0 (big circle), pulse everything else */
  paths.slice(1).forEach((p,i)=>{
    slIdle.push(gsap.to(p,{
      filter:'brightness(0.6)',
      duration:1.8 + i*0.06,
      yoyo:true, repeat:-1,
      ease:'sine.inOut',
      delay:i*0.1
    }));
  });
}

document.getElementById('sl-wrap').addEventListener('mouseenter',()=>{
  stopSlIdle();
  gsap.to(document.querySelectorAll('[id^="sl"]'),{filter:'brightness(1)',duration:0.2});
});
document.getElementById('sl-wrap').addEventListener('mouseleave',()=>{
  gsap.to(document.querySelectorAll('[id^="sl"]'),{filter:'brightness(1)',duration:0.2});
  setTimeout(startSlIdle,250);
});

/* ══════════════════════════════════
   EVENTS
   Entrance: 3 column groups build up, slower — unchanged, working
   Idle: scale breathe ONLY — no opacity, no brightness changes
   Hover: glow only
   ══════════════════════════════════ */
let evIdle=[];
function stopEvIdle(){evIdle.forEach(t=>t.kill());evIdle=[];}

function playEvents(){
  stopEvIdle();
  const paths=Array.from(document.querySelectorAll('[id^="ev"]'));
  const third=Math.floor(paths.length/3);
  gsap.set(paths,{opacity:0});
  const tl=gsap.timeline({onComplete:startEvIdle});
  tl.to(paths.slice(0,third),{opacity:1,duration:0.6,stagger:0.1,ease:'power2.out'});
  tl.to(paths.slice(third,third*2),{opacity:1,duration:0.6,stagger:0.1,ease:'power2.out'},'-=0.25');
  tl.to(paths.slice(third*2),{opacity:1,duration:0.6,stagger:0.1,ease:'power2.out'},'-=0.25');
  tl.to(paths[paths.length-1],{opacity:0.4,duration:0.35,yoyo:true,repeat:1});
  tl.add(()=>settle('#ev-wrap'));
}

function startEvIdle(){
  /* scale breathe only — everything stays at opacity 1 */
  evIdle.push(gsap.to('#ev-wrap',{
    scale:1.025, duration:3.5, yoyo:true, repeat:-1,
    ease:'sine.inOut', transformOrigin:'50% 50%'
  }));
}

document.getElementById('ev-wrap').addEventListener('mouseenter',()=>stopEvIdle());
document.getElementById('ev-wrap').addEventListener('mouseleave',()=>startEvIdle());

/* ══════════════════════════════════
   RESOURCES — unchanged, confirmed working
   ══════════════════════════════════ */
let rsIdle=[];
function stopRsIdle(){rsIdle.forEach(t=>t.kill());rsIdle=[];}
const rsBranches=['#rs5','#rs4','#rs3','#rs1','#rs2','#rs6'];

function playResources(){
  stopRsIdle();
  gsap.set(['#rs0',...rsBranches],{opacity:0});
  const tl=gsap.timeline({onComplete:startRsIdle});
  tl.to('#rs0',{opacity:1,duration:0.65},0.1);
  rsBranches.forEach((el,i)=>tl.to(el,{opacity:1,duration:0.38,ease:'power2.out'},0.6+i*0.13));
  tl.add(()=>settle('#rs-wrap'));
}
function startRsIdle(){
  rsIdle.push(gsap.to('#rs0',{opacity:0.7,duration:2.5,yoyo:true,repeat:-1,ease:'sine.inOut'}));
  rsBranches.forEach((el,i)=>{
    rsIdle.push(gsap.to(el,{opacity:0.45,duration:1.8+i*0.3,yoyo:true,repeat:-1,ease:'sine.inOut',delay:i*0.35}));
  });
}
document.getElementById('rs-wrap').addEventListener('mouseenter',()=>{
  stopRsIdle();
  gsap.to(['#rs0',...rsBranches],{opacity:1,duration:0.2});
});
document.getElementById('rs-wrap').addEventListener('mouseleave',()=>{
  startRsIdle();
});

/* auto-play on load */
window.addEventListener('load',()=>{
  setTimeout(playCommunity,300);
  setTimeout(playVentures,500);
  setTimeout(playSolutions,700);
  setTimeout(playEvents,900);
  setTimeout(playResources,1100);
});
</script>
</body>
</html>
