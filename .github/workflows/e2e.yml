# .github/workflows/e2e.yml
name: e2e

on:
  deployment_status:

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.event.deployment.id || github.run_id }}
  cancel-in-progress: true

jobs:
  e2e-preview:
    name: e2e-preview
    if: github.event.deployment_status.state == 'success' && github.event.deployment_status.target_url != ''
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI: true
      PLAYWRIGHT_TEST_BASE_URL: ${{ github.event.deployment_status.target_url }}
      VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Restore node_modules cache
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-22-node-modules-${{ hashFiles('package-lock.json') }}
      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
      - name: Install Playwright browsers
        run: npx playwright install --with-deps
      - name: Run Playwright
        run: npx playwright test
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
